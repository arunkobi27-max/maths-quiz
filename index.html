<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ MathX : Le Quiz 3ème</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- VARIABLES DE COULEUR --- */
        :root {
    /* Couleurs vibrantes */
    --primary: #6366f1;    /* Indigo moderne */
    --accent: #a855f7;     /* Violet */
    --bg-gradient: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    --glass: rgba(255, 255, 255, 0.9);
    --text: #1e293b;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    
    /* ANIMATION DU FOND */
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}

/* Animation fluide du background */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* EFFET GLASSMORPHISM POUR LE QUIZ */
.quiz-container {
    background: var(--glass);
    backdrop-filter: blur(10px); /* Flou derrière la carte */
    -webkit-backdrop-filter: blur(10px);
    width: 90%;
    max-width: 450px;
    padding: 40px;
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    text-align: center;
}

/* Boutons plus "Apple Style" */
.option-btn {
    background: white;
    border: 1px solid rgba(0,0,0,0.05);
    padding: 16px;
    border-radius: 16px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
}

.option-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
    border-color: var(--primary);
}

        /* --- ÉTATS CLICKS (DYNAMIQUES VIA JS) --- */
        .option-btn.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
            animation: popIn 0.3s ease;
        }

        .option-btn.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
            animation: shake 0.3s ease;
        }

        /* Désactiver les boutons après réponse */
        .option-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- ZONE DE FEEDBACK --- */
        #feedback {
            margin-top: 25px;
            min-height: 1.2em;
            font-weight: 600;
            font-size: 1rem;
        }

        /* --- ANIMATIONS CSS --- */
        @keyframes popIn {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        /* Adaptations mobiles */
        @media (max-width: 480px) {
            .quiz-container { padding: 25px; }
            h1 { font-size: 1.2rem; }
            .question-text { font-size: 1.1rem; }
            .option-btn { padding: 12px 15px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>⚡ MathX Brevet</h1>
    
    <div class="question-box">
        <p class="question-text" id="enonce">
            </p>
    </div>

    <div class="options-container" id="options">
        </div>

    <p id="feedback"></p>
</div>

<script>
    // --- DONNÉES DU QUIZ ---
    const listeQuestions = [
        {
            question: "Calcule : 3 + 2 × 5",
            reponses: ["25", "13", "10", "15"],
            correct: 1 // Indice de la bonne réponse (13 est à l'indice 1)
        },
        {
            question: "Quelle est la racine carrée de 64 ?",
            reponses: ["6", "7", "8", "9"],
            correct: 2
        },
        {
            question: "Développe : (x + 2)²",
            reponses: ["x² + 4", "x² + 4x + 4", "x² + 2x + 4", "2x + 4"],
            correct: 1
        }
    ];

    // Variables d'état
    let questionActuelle = 0;

    // --- FONCTIONS ---

    // 1. Charger une question
    function chargerQuestion() {
        const data = listeQuestions[questionActuelle];
        const enonceEl = document.getElementById('enonce');
        const optionsEl = document.getElementById('options');
        const feedbackEl = document.getElementById('feedback');

        // Reset
        feedbackEl.textContent = "";
        optionsEl.innerHTML = ""; // Vider les anciens boutons

        // Afficher l'énoncé
        enonceEl.textContent = data.question;

        // Créer les boutons d'option
        data.reponses.forEach((texteReponse, index) => {
            const bouton = document.createElement('button');
            bouton.className = 'option-btn';
            bouton.textContent = texteReponse;
            bouton.onclick = () => verifierReponse(index, bouton);
            optionsEl.appendChild(bouton);
        });
    }

    // 2. Vérifier la réponse cliquée
    function verifierReponse(indexChoisi, boutonClique) {
        const data = listeQuestions[questionActuelle];
        const tousLesBoutons = document.querySelectorAll('.option-btn');
        const feedbackEl = document.getElementById('feedback');

        // Désactiver tous les boutons pour empêcher de rejouer
        tousLesBoutons.forEach(btn => btn.disabled = true);

        if (indexChoisi === data.correct) {
            // BONNE RÉPONSE
            boutonClique.classList.add('correct');
            feedbackEl.textContent = "🥳 Excellent !";
            feedbackEl.style.color = "var(--correct)";
        } else {
            // MAUVAISE RÉPONSE
            boutonClique.classList.add('wrong');
            // Montrer la bonne réponse en vert quand même
            tousLesBoutons[data.correct].classList.add('correct');
            feedbackEl.textContent = "😥 Oups... Regarde la correction.";
            feedbackEl.style.color = "var(--wrong)";
        }

        // Passer à la question suivante après un petit délai (2 secondes)
        setTimeout(() => {
            questionActuelle++;
            if (questionActuelle < listeQuestions.length) {
                chargerQuestion();
            } else {
                // FIN DU QUIZ
                document.querySelector('.quiz-container').innerHTML = `
                    <h1>🎉 Terminé !</h1>
                    <p class='question-text'>Merci d'avoir révisé avec MathX.</p>
                    <button class='option-btn' style='margin-top:20px; background:var(--primary); color:white; border:none;' onclick='location.reload()'>Recommencer</button>
                `;
            }
        }, 2000);
    }

    // --- Lancement au chargement de la page ---
    chargerQuestion();

</script>

</body>
</html>
